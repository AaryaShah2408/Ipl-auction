<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IPL Auction 2024</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">IPL <span>AUCTION</span></a>
  <div class="nav-links">
    <a href="/" class="active">Players</a>
    <a href="/admin">Admin</a>
  </div>
</nav>

<div class="hero">
  <h1>IPL PLAYER <span class="highlight">AUCTION</span></h1>
  <p><span class="live-dot"></span> Live Bidding • Season 2024</p>
</div>

<div class="filters">
  <input type="text" id="searchInput" placeholder="🔍 Search players..." style="min-width:200px"/>
  <select id="roleFilter">
    <option value="">All Roles</option>
    <option value="Batsman">Batsman</option>
    <option value="Bowler">Bowler</option>
    <option value="All-Rounder">All-Rounder</option>
    <option value="Wicket-Keeper">Wicket-Keeper</option>
  </select>
  <select id="nationalityFilter">
    <option value="">All Nationalities</option>
    <option value="Indian">Indian</option>
    <option value="Australian">Australian</option>
    <option value="English">English</option>
    <option value="South African">South African</option>
    <option value="West Indian">West Indian</option>
  </select>
  <select id="statusFilter">
    <option value="">All Status</option>
    <option value="available">Available</option>
    <option value="sold">Sold</option>
  </select>
</div>

<div class="players-grid" id="playersGrid">
  <div class="loading"><div class="spinner"></div></div>
</div>

<!-- BID MODAL -->
<div class="modal-overlay" id="bidModal">
  <div class="modal">
    <h2>PLACE BID</h2>
    <div id="bidPlayerInfo" style="margin-bottom:1.5rem; padding:1rem; background:var(--navy); border-radius:8px; border:1px solid var(--border);">
      <div style="font-family:'Teko',sans-serif; font-size:1.4rem;" id="bidPlayerName"></div>
      <div style="margin-top:0.5rem;">
        Current Bid: <span style="color:var(--gold); font-family:'Teko',sans-serif; font-size:1.2rem;" id="bidCurrentAmount"></span>
        <span style="color:var(--muted); font-size:0.85rem;" id="bidCurrentTeam"></span>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="bidderName" placeholder="e.g. Mukesh Ambani"/>
      </div>
      <div class="form-group">
        <label>Team Name</label>
        <input type="text" id="bidTeamName" placeholder="e.g. Mumbai Indians"/>
      </div>
    </div>
    <div class="form-group">
      <label>Bid Amount (₹)</label>
      <input type="number" id="bidAmount" placeholder="Enter amount in ₹"/>
    </div>
    <div style="display:flex; gap:1rem; margin-top:1rem;">
      <button class="btn btn-gold" onclick="submitBid()">🏏 Place Bid</button>
      <button class="btn btn-outline" onclick="closeBidModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
